<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpotyCore - Discord Music Activity</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0e14;
      --surface: rgba(10, 14, 20, 0.95);
      --surface-light: rgba(20, 28, 40, 0.8);
      --border: rgba(0, 240, 216, 0.12);
      --text: #e9f5ff;
      --text-muted: #8fa3b8;
      --cyan: #00f0d8;
      --green: #1fda6d;
      --red: #ff4757;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0e14 0%, #0f1419 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }

    /* HEADER */
    header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 1px;
      color: var(--cyan);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), var(--green));
      box-shadow: 0 0 10px rgba(0, 240, 216, 0.6);
    }

    .status-badge {
      font-size: 11px;
      padding: 4px 8px;
      background: rgba(31, 218, 109, 0.15);
      border: 1px solid var(--green);
      border-radius: 999px;
      color: var(--green);
    }

    .header-center {
      flex: 1;
      max-width: 300px;
      position: relative;
    }

    .search-box {
      width: 100%;
      padding: 8px 12px 8px 30px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 12px;
      outline: none;
      transition: all 200ms;
    }

    .search-box:focus {
      border-color: var(--cyan);
      background: rgba(0, 240, 216, 0.08);
      box-shadow: 0 0 12px rgba(0, 240, 216, 0.15);
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      opacity: 0.5;
    }

    .search-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
    }

    .search-dropdown.active {
      display: block;
    }

    .search-item {
      padding: 8px 12px;
      border-bottom: 1px solid rgba(0, 240, 216, 0.06);
      cursor: pointer;
      transition: background 150ms;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }

    .search-item:hover {
      background: rgba(0, 240, 216, 0.1);
    }

    .search-item-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .search-item-title {
      color: var(--text);
      font-weight: 500;
    }

    .search-item-artist {
      color: var(--text-muted);
      font-size: 11px;
    }

    .add-btn {
      padding: 4px 8px;
      background: rgba(0, 240, 216, 0.1);
      border: 1px solid var(--cyan);
      border-radius: 6px;
      color: var(--cyan);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 150ms;
    }

    .add-btn:hover {
      background: rgba(0, 240, 216, 0.2);
    }

    .header-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all 150ms;
      font-size: 16px;
    }

    .btn-icon:hover {
      background: rgba(0, 240, 216, 0.1);
      color: var(--cyan);
      border-color: var(--cyan);
    }

    /* MAIN CONTENT */
    .content {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 12px;
      padding: 12px;
      overflow: hidden;
    }

    /* PLAYER */
    .player-card {
      background: linear-gradient(135deg, rgba(0, 240, 216, 0.08), rgba(31, 218, 109, 0.04));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .album-art {
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(135deg, #1a3a3a, #0f5555);
      border-radius: 12px;
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }

    .album-icon {
      font-size: 48px;
      opacity: 0.3;
    }

    .now-playing {
      text-align: center;
    }

    .track-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      word-break: break-word;
    }

    .track-artist {
      font-size: 12px;
      color: var(--text-muted);
    }

    .progress-container {
      width: 100%;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      width: 0%;
      transition: width 100ms linear;
    }

    .time-info {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .control-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      background: rgba(0, 240, 216, 0.08);
      border-radius: 8px;
      color: var(--cyan);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 150ms;
    }

    .control-btn:hover {
      background: rgba(0, 240, 216, 0.2);
      transform: scale(1.05);
    }

    .control-btn.play {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--cyan), var(--green));
      border: none;
      color: #000;
      font-weight: bold;
    }

    .control-btn.play:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px rgba(0, 240, 216, 0.3);
    }

    .host-badge {
      font-size: 11px;
      padding: 4px 8px;
      background: rgba(255, 71, 87, 0.15);
      border: 1px solid var(--red);
      border-radius: 4px;
      color: var(--red);
      text-align: center;
      margin-top: 8px;
    }

    /* SIDEBAR */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }

    .sidebar-card {
      background: var(--surface-light);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .user-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .user-chip {
      padding: 8px;
      background: rgba(0, 240, 216, 0.08);
      border: 1px solid rgba(0, 240, 216, 0.2);
      border-radius: 8px;
      font-size: 11px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .user-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), var(--green));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-weight: bold;
      font-size: 10px;
    }

    .user-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    /* PLAYLIST MENU */
    .playlist-menu {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      transition: height 300ms ease;
      overflow-y: auto;
      z-index: 100;
    }

    .playlist-menu.open {
      height: 50vh;
    }

    .playlist-header {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
    }

    .playlist-header h3 {
      font-size: 14px;
      color: var(--text);
    }

    .close-playlist {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 20px;
    }

    .playlist-items {
      padding: 8px 0;
    }

    .playlist-item {
      padding: 10px 16px;
      border-bottom: 1px solid rgba(0, 240, 216, 0.06);
      cursor: pointer;
      transition: background 150ms;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }

    .playlist-item:hover {
      background: rgba(0, 240, 216, 0.1);
    }

    .playlist-item.active {
      background: rgba(0, 240, 216, 0.15);
      border-left: 3px solid var(--cyan);
    }

    .playlist-item-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .playlist-item-title {
      color: var(--text);
      font-weight: 500;
    }

    .playlist-item-artist {
      color: var(--text-muted);
      font-size: 11px;
    }

    .delete-btn {
      background: rgba(255, 71, 87, 0.15);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      transition: all 150ms;
    }

    .delete-btn:hover {
      background: rgba(255, 71, 87, 0.3);
    }

    .toggle-playlist {
      position: fixed;
      bottom: 12px;
      right: 12px;
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--cyan), var(--green));
      border: none;
      border-radius: 50%;
      color: #000;
      font-size: 20px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(0, 240, 216, 0.3);
      transition: all 200ms;
      z-index: 50;
    }

    .toggle-playlist:hover {
      transform: scale(1.1);
    }

    @media (max-width: 768px) {
      .content {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .toggle-playlist {
        display: flex;
      }

      header {
        flex-wrap: wrap;
      }

      .header-center {
        order: 3;
        flex-basis: 100%;
        max-width: none;
      }

      .player-card {
        max-width: 100%;
      }
    }

    @media (max-width: 480px) {
      header {
        padding: 10px 12px;
      }

      .search-box {
        font-size: 11px;
        padding: 6px 10px 6px 26px;
      }

      .album-art {
        max-width: 200px;
        margin: 0 auto;
      }

      .control-btn {
        width: 32px;
        height: 32px;
        font-size: 14px;
      }

      .control-btn.play {
        width: 40px;
        height: 40px;
      }

      .track-title {
        font-size: 13px;
      }
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="logo">
          <div class="logo-dot"></div>
          Spotycord
        </div>
        <div class="status-badge">LIVE</div>
      </div>

      <div class="header-center">
        <div style="position: relative;">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <input 
            type="text" 
            class="search-box" 
            id="searchInput" 
            placeholder="Suche Songs..."
            autocomplete="off"
          >
          <div class="search-dropdown" id="searchDropdown"></div>
        </div>
      </div>

      <div class="header-right">
        <button class="btn-icon" onclick="togglePlaylistMobile()" title="Playlist">
          📋
        </button>
        <button class="btn-icon" onclick="shareActivity()" title="Teilen">
          🔗
        </button>
      </div>
    </header>

    <div class="content">
      <div class="player-card">
        <div class="album-art">
          <div class="album-icon">🎵</div>
        </div>

        <div class="now-playing">
          <div class="track-title" id="nowTitle">Keine Musik</div>
          <div class="track-artist" id="nowArtist">Füge einen Song hinzu</div>
        </div>

        <div class="progress-container">
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
          </div>
        </div>

        <div class="controls">
          <button class="control-btn" onclick="previousTrack()" title="Zurück">⏮</button>
          <button class="control-btn play" onclick="togglePlay()" id="playBtn" title="Play">▶</button>
          <button class="control-btn" onclick="nextTrack()" title="Weiter">⏭</button>
        </div>

        <div class="host-badge" id="hostBadge"></div>
      </div>

      <div class="sidebar">
        <div class="sidebar-card">
          <div class="sidebar-title">Online</div>
          <div class="user-list" id="userList">
            <div style="font-size: 11px; color: var(--text-muted);">Lädt...</div>
          </div>
        </div>
      </div>
    </div>

    <div class="playlist-menu" id="playlistMenu">
      <div class="playlist-header">
        <h3>Queue</h3>
        <button class="close-playlist" onclick="togglePlaylistMobile()">×</button>
      </div>
      <div class="playlist-items" id="playlistItems"></div>
    </div>

    <button class="toggle-playlist" id="toggleBtn" onclick="togglePlaylistMobile()">📋</button>
  </div>

  <script>
    // STATE
    let playlist = [];
    let currentIndex = -1;
    let isPlaying = false;
    let currentTime = 0;
    let playbackInterval = null;
    let isHost = Math.random() > 0.5;
    let activityUsers = [];

    // FREE MUSIC APIS
    const musicApis = [
      { name: 'Jikan API', url: 'https://api.jikan.moe/v4/top/anime' },
      { name: 'Open Library', url: 'https://openlibrary.org/search.json' }
    ];

    // Mock song database (simulates API results)
    const songDatabase = [
      { title: 'Midnight Dreams', artist: 'Neon Waves', duration: 180 },
      { title: 'Electric Pulse', artist: 'Cyber Vibes', duration: 210 },
      { title: 'Digital Horizon', artist: 'Synth Echo', duration: 195 },
      { title: 'Neon Nights', artist: 'Night Runner', duration: 240 },
      { title: 'Crystal Sound', artist: 'Glass Sound', duration: 205 },
      { title: 'Velocity Rush', artist: 'Speed Light', duration: 190 },
      { title: 'Silent Stars', artist: 'Space Float', duration: 225 },
      { title: 'Ocean Drift', artist: 'Wave Rider', duration: 215 },
      { title: 'Phoenix Rise', artist: 'Fire Bird', duration: 230 },
      { title: 'Lunar Path', artist: 'Moon Walk', duration: 200 },
    ];

    // SEARCH
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      const dropdown = document.getElementById('searchDropdown');

      if (!query) {
        dropdown.classList.remove('active');
        return;
      }

      const results = songDatabase.filter(s => 
        s.title.toLowerCase().includes(query) || 
        s.artist.toLowerCase().includes(query)
      );

      dropdown.innerHTML = results.map(song => `
        <div class="search-item">
          <div class="search-item-info">
            <div class="search-item-title">${song.title}</div>
            <div class="search-item-artist">${song.artist}</div>
          </div>
          <button class="add-btn" onclick="addToPlaylist({title: '${song.title}', artist: '${song.artist}', duration: ${song.duration}})">+ Hinzufügen</button>
        </div>
      `).join('');

      dropdown.classList.toggle('active', results.length > 0);
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.header-center')) {
        document.getElementById('searchDropdown').classList.remove('active');
      }
    });

    function addToPlaylist(track) {
      playlist.push(track);
      document.getElementById('searchInput').value = '';
      document.getElementById('searchDropdown').classList.remove('active');
      renderPlaylist();
      if (currentIndex === -1) playTrack(0);
    }

    // PLAYBACK
    function playTrack(index) {
      if (playlist.length === 0) return;
      currentIndex = index;
      currentTime = 0;
      isPlaying = true;
      updateDisplay();
      simulatePlayback();
    }

    function togglePlay() {
      if (playlist.length === 0) {
        alert('Keine Songs in der Queue!');
        return;
      }
      if (currentIndex === -1) playTrack(0);
      else {
        isPlaying = !isPlaying;
        if (isPlaying) simulatePlayback();
        else if (playbackInterval) clearInterval(playbackInterval);
      }
      updateDisplay();
    }

    function nextTrack() {
      if (playlist.length === 0) return;
      currentIndex = (currentIndex + 1) % playlist.length;
      currentTime = 0;
      isPlaying = true;
      updateDisplay();
      simulatePlayback();
    }

    function previousTrack() {
      if (playlist.length === 0) return;
      currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
      currentTime = 0;
      isPlaying = true;
      updateDisplay();
      simulatePlayback();
    }

    function simulatePlayback() {
      if (playbackInterval) clearInterval(playbackInterval);
      if (!isPlaying) return;

      const track = playlist[currentIndex];
      playbackInterval = setInterval(() => {
        if (!isPlaying) {
          clearInterval(playbackInterval);
          return;
        }
        currentTime += 0.05;
        const percent = (currentTime / track.duration) * 100;
        document.getElementById('progressFill').style.width = Math.min(percent, 100) + '%';
        document.getElementById('currentTime').textContent = formatTime(currentTime);

        if (currentTime >= track.duration) {
          clearInterval(playbackInterval);
          nextTrack();
          simulatePlayback();
        }
      }, 50);
    }

    function updateDisplay() {
      const track = playlist[currentIndex] || {};
      document.getElementById('nowTitle').textContent = track.title || 'Keine Musik';
      document.getElementById('nowArtist').textContent = track.artist || 'Keine Songs';
      document.getElementById('duration').textContent = formatTime(track.duration || 0);
      document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';

      document.querySelectorAll('.playlist-item').forEach((el, i) => {
        el.classList.toggle('active', i === currentIndex);
      });

      const hostText = isHost ? '👑 Du bist Host (Kontrolle)' : '🎧 Hörer (nur Abspielen)';
      document.getElementById('hostBadge').textContent = hostText;
    }

    function renderPlaylist() {
      const container = document.getElementById('playlistItems');
      if (playlist.length === 0) {
        container.innerHTML = '<div style="padding: 16px; text-align: center; color: var(--text-muted); font-size: 12px;">Queue leer</div>';
        return;
      }

      container.innerHTML = playlist.map((track, i) => `
        <div class="playlist-item ${i === currentIndex ? 'active' : ''}" onclick="playTrack(${i})">
          <div class="playlist-item-info">
            <div class="playlist-item-title">${track.title}</div>
            <div class="playlist-item-artist">${track.artist}</div>
          </div>
          ${isHost ? `<button class="delete-btn" onclick="removeTrack(${i}, event)">✕</button>` : ''}
        </div>
      `).join('');
    }

    function removeTrack(index, e) {
      e.stopPropagation();
      if (!isHost) return;
      playlist.splice(index, 1);
      if (currentIndex >= index && currentIndex > 0) currentIndex--;
      if (playlist.length === 0) {
        currentIndex = -1;
        isPlaying = false;
        clearInterval(playbackInterval);
      }
      updateDisplay();
      renderPlaylist();
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    // PROGRESS BAR
    document.getElementById('progressBar').addEventListener('click', (e) => {
      if (playlist.length === 0) return;
      const rect = e.currentTarget.getBoundingClientRect();
      const percent = (e.clientX - rect.left) / rect.width;
      currentTime = percent * playlist[currentIndex].duration;
      document.getElementById('progressFill').style.width = (percent * 100) + '%';
      document.getElementById('currentTime').textContent = formatTime(currentTime);
    });

    // USERS (MOCK)
    function loadUsers() {
      const users = ['User1', 'User2', 'User3'].slice(0, 2 + Math.floor(Math.random() * 3));
      const container = document.getElementById('userList');
      
      if (users.length === 0) {
        container.innerHTML = '<div style="font-size: 11px; color: var(--text-muted);">Keine Benutzer</div>';
        return;
      }

      container.innerHTML = users.map(u => `
        <div class="user-chip">
          <div class="user-avatar">${u.substring(0, 1)}</div>
          <span>${u}</span>
          <div class="user-status"></div>
        </div>
      `).join('');
    }

    // MOBILE PLAYLIST
    function togglePlaylistMobile() {
      document.getElementById('playlistMenu').classList.toggle('open');
    }

    function shareActivity() {
      if (currentIndex === -1) {
        alert('Starte einen Song um zu teilen!');
        return;
      }
      const track = playlist[currentIndex];
      alert(`Teile: ${track.title} - ${track.artist}`);
    }

    // INIT
    loadUsers();
    renderPlaylist();
  </script>
</body>
</html>
