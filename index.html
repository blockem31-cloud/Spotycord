<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpotyCore - Discord Music Activity</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050608;
      --surface: rgba(10, 14, 20, 0.78);
      --surface-strong: rgba(15, 20, 30, 0.96);
      --border: rgba(98, 255, 235, 0.14);
      --text: #e9f5ff;
      --muted: #9ab3c9;
      --cyan: #00f0d8;
      --cyan-soft: rgba(0, 240, 216, 0.18);
      --green: #31f26f;
      --shadow: 0 32px 80px rgba(0, 0, 0, 0.35);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(0, 240, 216, 0.12), transparent 24%),
                  radial-gradient(circle at bottom right, rgba(49, 242, 111, 0.08), transparent 18%),
                  linear-gradient(180deg, #090b0f 0%, #040506 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    .page {
      position: relative;
      padding: 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 12px 0 28px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      font-size: 0.9rem;
      color: #a7f9eb;
      font-weight: 700;
    }

    .brand span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), var(--green));
      box-shadow: 0 0 14px rgba(0, 240, 216, 0.5);
    }

    /* SEARCH BAR */
    .search-container {
      flex: 1;
      max-width: 600px;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 40px;
      border-radius: 999px;
      border: 1px solid rgba(98, 255, 235, 0.18);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 1rem;
      transition: all 180ms ease;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--cyan);
      background: rgba(0, 240, 216, 0.1);
      box-shadow: 0 0 12px rgba(0, 240, 216, 0.2);
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
    }

    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: 8px;
      background: var(--surface-strong);
      border: 1px solid rgba(98, 255, 235, 0.18);
      border-radius: 16px;
      max-height: 400px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }

    .search-results.active {
      display: block;
    }

    .search-result-item {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(98, 255, 235, 0.08);
      cursor: pointer;
      transition: background 180ms ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .search-result-item:last-child {
      border-bottom: none;
    }

    .search-result-item:hover {
      background: rgba(0, 240, 216, 0.12);
    }

    .search-result-info {
      flex: 1;
    }

    .search-result-title {
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      margin: 0;
    }

    .search-result-artist {
      color: var(--muted);
      font-size: 0.85rem;
      margin: 2px 0 0;
    }

    .search-result-add {
      background: rgba(0, 240, 216, 0.1);
      border: 1px solid rgba(98, 255, 235, 0.2);
      color: var(--cyan);
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 180ms ease;
    }

    .search-result-add:hover {
      background: rgba(0, 240, 216, 0.2);
      box-shadow: 0 0 12px rgba(0, 240, 216, 0.2);
    }

    .nav {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(98, 255, 235, 0.18);
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 180ms ease;
    }

    .icon-btn:hover {
      background: rgba(0, 240, 216, 0.12);
      color: var(--cyan);
      border-color: rgba(98, 255, 235, 0.3);
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    /* MAIN PLAYER SECTION */
    .player-section {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 32px;
      padding: 24px 0 48px;
    }

    .now-playing {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .album-art {
      position: relative;
      width: 100%;
      max-width: 400px;
      aspect-ratio: 1;
      border-radius: 32px;
      border: 1px solid rgba(98, 255, 235, 0.18);
      background: linear-gradient(135deg, rgba(0, 240, 216, 0.15), rgba(49, 242, 111, 0.08));
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .album-art::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0, 240, 216, 0.1), transparent 40%);
      pointer-events: none;
    }

    .album-placeholder {
      width: 80%;
      height: 80%;
      background: linear-gradient(135deg, #1a3a3a, #0f5555);
      border-radius: 16px;
      display: grid;
      place-items: center;
      position: relative;
      z-index: 1;
    }

    .album-placeholder svg {
      width: 60%;
      height: 60%;
      opacity: 0.6;
    }

    .song-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .song-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }

    .song-artist {
      font-size: 1.1rem;
      color: var(--muted);
      margin: 0;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      overflow: hidden;
      cursor: pointer;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      width: 35%;
      transition: width 100ms linear;
    }

    .time-display {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 8px;
    }

    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .control-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid rgba(98, 255, 235, 0.18);
      background: rgba(0, 240, 216, 0.1);
      color: var(--cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 180ms ease;
    }

    .control-btn:hover {
      background: rgba(0, 240, 216, 0.2);
      box-shadow: 0 0 20px rgba(0, 240, 216, 0.3);
      transform: scale(1.05);
    }

    .control-btn.play {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--cyan), var(--green));
      border: none;
      color: #000;
    }

    .control-btn.play:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 32px rgba(0, 240, 216, 0.4);
    }

    .control-btn svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: currentColor;
      stroke-width: 0.5;
    }

    /* SIDEBAR - VOICE & USERS */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
      height: fit-content;
    }

    .sidebar-card {
      padding: 20px;
      border-radius: 24px;
      border: 1px solid rgba(98, 255, 235, 0.12);
      background: rgba(11, 16, 28, 0.82);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 58px rgba(0, 0, 0, 0.22);
    }

    .sidebar-card h3 {
      margin: 0 0 16px;
      font-size: 1.1rem;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-card h3 svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .voice-status {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(0, 240, 216, 0.08);
      border-radius: 16px;
      margin-bottom: 12px;
    }

    .voice-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 14px rgba(49, 242, 111, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .voice-text {
      flex: 1;
    }

    .voice-text strong {
      display: block;
      color: #fff;
      font-size: 0.95rem;
    }

    .voice-text span {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .connect-btn {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid rgba(98, 255, 235, 0.18);
      background: rgba(0, 240, 216, 0.14);
      color: #e8ffff;
      cursor: pointer;
      font-weight: 600;
      transition: all 180ms ease;
    }

    .connect-btn:hover {
      background: rgba(0, 240, 216, 0.24);
      box-shadow: 0 8px 24px rgba(0, 240, 216, 0.2);
    }

    .users-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      transition: background 180ms ease;
    }

    .user-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), var(--green));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-weight: bold;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .user-info {
      flex: 1;
      min-width: 0;
    }

    .user-name {
      font-size: 0.95rem;
      color: #fff;
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .user-status {
      font-size: 0.8rem;
      color: var(--muted);
      margin: 2px 0 0;
    }

    /* PLAYLIST SECTION */
    .playlist-section {
      padding: 40px 0;
    }

    .section-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .section-heading h2 {
      margin: 0;
      font-size: 2rem;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-heading h2 svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .add-song-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1px solid rgba(98, 255, 235, 0.18);
      background: rgba(0, 240, 216, 0.14);
      color: #e8ffff;
      cursor: pointer;
      transition: all 180ms ease;
      font-weight: 600;
    }

    .add-song-btn:hover {
      background: rgba(0, 240, 216, 0.24);
      box-shadow: 0 8px 24px rgba(0, 240, 216, 0.2);
    }

    .add-song-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .playlist {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .track-item {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 16px;
      align-items: center;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(98, 255, 235, 0.08);
      transition: all 180ms ease;
      cursor: pointer;
    }

    .track-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(98, 255, 235, 0.18);
    }

    .track-item.active {
      background: rgba(0, 240, 216, 0.12);
      border-color: rgba(98, 255, 235, 0.3);
    }

    .track-number {
      width: 36px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .track-item.active .track-number {
      color: var(--cyan);
    }

    .track-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .track-name {
      color: #fff;
      font-weight: 600;
      margin: 0;
    }

    .track-artist {
      color: var(--muted);
      font-size: 0.85rem;
      margin: 0;
    }

    .track-duration {
      color: var(--muted);
      font-size: 0.9rem;
      width: 40px;
      text-align: right;
    }

    .track-actions {
      display: flex;
      gap: 8px;
    }

    .track-action-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 240, 216, 0.1);
      color: var(--cyan);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 180ms ease;
    }

    .track-action-btn:hover {
      background: rgba(0, 240, 216, 0.25);
      transform: scale(1.1);
    }

    .track-action-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--surface-strong);
      border: 1px solid rgba(98, 255, 235, 0.18);
      border-radius: 28px;
      padding: 32px;
      max-width: 500px;
      width: 100%;
      box-shadow: var(--shadow);
    }

    .modal-content h2 {
      margin: 0 0 24px;
      font-size: 1.5rem;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-content h2 svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .form-group label {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    .form-group input {
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(98, 255, 235, 0.18);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 1rem;
      transition: all 180ms ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--cyan);
      background: rgba(0, 240, 216, 0.1);
      box-shadow: 0 0 12px rgba(0, 240, 216, 0.2);
    }

    .form-group input::placeholder {
      color: var(--muted);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 180ms ease;
      font-size: 1rem;
    }

    .modal-buttons .btn-submit {
      background: linear-gradient(135deg, var(--cyan), var(--green));
      color: #000;
    }

    .modal-buttons .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(0, 240, 216, 0.3);
    }

    .modal-buttons .btn-cancel {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(98, 255, 235, 0.18);
    }

    .modal-buttons .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    /* FOOTER */
    footer {
      padding: 28px 0 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
      width: 100%;
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .player-section {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .album-art {
        max-width: 300px;
        margin: 0 auto;
      }
    }

    @media (max-width: 768px) {
      .page {
        padding: 20px;
      }

      header {
        flex-direction: column;
        align-items: stretch;
      }

      .search-container {
        order: 3;
        flex-basis: 100%;
        max-width: none;
      }

      .nav {
        justify-content: flex-start;
      }

      .section-heading {
        flex-direction: column;
        align-items: flex-start;
      }

      .track-item {
        grid-template-columns: auto 1fr;
        gap: 12px;
      }

      .track-duration,
      .track-actions {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .page {
        padding: 16px;
      }

      .album-art {
        max-width: 100%;
      }

      .control-btn {
        width: 48px;
        height: 48px;
      }

      .control-btn.play {
        width: 56px;
        height: 56px;
      }

      .song-title {
        font-size: 1.4rem;
      }

      .modal-content {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <!-- HEADER WITH SEARCH -->
    <header>
      <div class="brand"><span></span>SpotyCore</div>
      
      <div class="search-container">
        <div class="search-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </div>
        <input 
          type="text" 
          id="searchInput" 
          class="search-input" 
          placeholder="Song, Künstler, Album..."
          autocomplete="off"
        >
        <div class="search-results" id="searchResults"></div>
      </div>

      <nav class="nav">
        <button class="icon-btn" onclick="shareActivity()" title="Teilen">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
            <polyline points="16 6 12 2 8 6"></polyline>
            <line x1="12" y1="2" x2="12" y2="15"></line>
          </svg>
        </button>
        <button class="icon-btn" onclick="openSettings()" title="Einstellungen">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="1"></circle>
            <circle cx="19" cy="12" r="1"></circle>
            <circle cx="5" cy="12" r="1"></circle>
          </svg>
        </button>
      </nav>
    </header>

    <!-- MAIN PLAYER & SIDEBAR -->
    <section class="player-section">
      <!-- NOW PLAYING -->
      <div class="now-playing">
        <div class="album-art">
          <div class="album-placeholder">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="2" opacity="0.3"/>
              <circle cx="50" cy="50" r="30" stroke="currentColor" stroke-width="2"/>
              <circle cx="50" cy="50" r="15" fill="currentColor" opacity="0.5"/>
            </svg>
          </div>
        </div>

        <div class="song-info">
          <h1 class="song-title" id="nowPlayingTitle">Keine Musik</h1>
          <p class="song-artist" id="nowPlayingArtist">Füge einen Song hinzu</p>
        </div>

        <div>
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="time-display">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
          </div>
        </div>

        <div class="controls">
          <button class="control-btn" onclick="previousTrack()" title="Vorheriger Song">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <polyline points="19 15 12 8 12 16"></polyline>
              <polyline points="5 15 5 9"></polyline>
            </svg>
          </button>
          <button class="control-btn play" onclick="togglePlay()" title="Play/Pause">
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <polygon points="5 3 19 12 5 21"></polygon>
            </svg>
          </button>
          <button class="control-btn" onclick="nextTrack()" title="Nächster Song">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <polyline points="5 9 12 16 12 8"></polyline>
              <polyline points="19 9 19 15"></polyline>
            </svg>
          </button>
        </div>
      </div>

      <!-- SIDEBAR -->
      <div class="sidebar">
        <!-- Voice Channel -->
        <div class="sidebar-card">
          <h3>
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M23 7v10c0 1.1-.9 2-2 2h-1v2h-2v-2h-4v2h-2v-2H8v2H6v-2H5c-1.1 0-2-.9-2-2V7c0-1.1.9-2 2-2h14c1.1 0 2 .9 2 2z"></path>
              <rect x="5" y="9" width="14" height="8" rx="1"></rect>
            </svg>
            Voice Channel
          </h3>
          <div class="voice-status">
            <div class="voice-indicator"></div>
            <div class="voice-text">
              <strong>Aktiv</strong>
              <span>Discord Server</span>
            </div>
          </div>
          <button class="connect-btn" onclick="connectVoice()">Beitreten</button>
        </div>

        <!-- Online Users -->
        <div class="sidebar-card">
          <h3>
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            Online
          </h3>
          <div class="users-list" id="usersList"></div>
        </div>
      </div>
    </section>

    <!-- PLAYLIST SECTION -->
    <section class="playlist-section">
      <div class="section-heading">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="8" y1="5" x2="20" y2="5"></line>
            <line x1="8" y1="11" x2="20" y2="11"></line>
            <line x1="8" y1="17" x2="20" y2="17"></line>
            <polyline points="3 5 3 17"></polyline>
          </svg>
          Queue
        </h2>
        <button class="add-song-btn" onclick="openAddSongModal()">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Song hinzufügen
        </button>
      </div>

      <div class="playlist" id="playlist">
        <div style="text-align: center; padding: 40px 20px; color: var(--muted);">
          <p>Keine Songs in der Queue. Nutze die Suchleiste um einen Song hinzuzufügen!</p>
        </div>
      </div>
    </section>

    <!-- MODAL FOR ADDING SONGS -->
    <div class="modal" id="addSongModal">
      <div class="modal-content">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="14" r="5"></circle>
            <path d="M12 14v-5"></path>
          </svg>
          Song hinzufügen
        </h2>
        <form onsubmit="addNewSong(event)">
          <div class="form-group">
            <label for="songName">Titel</label>
            <input type="text" id="songName" placeholder="z.B. Blinding Lights" required>
          </div>
          <div class="form-group">
            <label for="artistName">Künstler</label>
            <input type="text" id="artistName" placeholder="z.B. The Weeknd" required>
          </div>
          <div class="form-group">
            <label for="songDuration">Dauer (MM:SS)</label>
            <input type="text" id="songDuration" placeholder="z.B. 3:20" value="3:45" required>
          </div>
          <div class="modal-buttons">
            <button type="submit" class="btn-submit">Hinzufügen</button>
            <button type="button" class="btn-cancel" onclick="closeAddSongModal()">Abbrechen</button>
          </div>
        </form>
      </div>
    </div>

    <!-- FOOTER -->
    <footer>
      <span>SpotyCore</span>
      <span>Discord Music Activity</span>
    </footer>
  </main>

  <script>
    // ===== STATE & DATA =====
    let currentTrackIndex = -1;
    let isPlaying = false;
    let currentTime = 0;
    let playbackInterval = null;

    // Musik Datenbank (Mock API)
    const musicDatabase = [
      { title: 'Blinding Lights', artist: 'The Weeknd', duration: 200 },
      { title: 'Shape of You', artist: 'Ed Sheeran', duration: 234 },
      { title: 'Someone Like You', artist: 'Adele', duration: 285 },
      { title: 'Perfect', artist: 'Ed Sheeran', duration: 263 },
      { title: 'Uptown Funk', artist: 'Mark Ronson ft. Bruno Mars', duration: 269 },
      { title: 'Bohemian Rhapsody', artist: 'Queen', duration: 354 },
      { title: 'Stairway to Heaven', artist: 'Led Zeppelin', duration: 482 },
      { title: 'Hotel California', artist: 'Eagles', duration: 391 },
      { title: 'Imagine', artist: 'John Lennon', duration: 183 },
      { title: 'Like a Rolling Stone', artist: 'Bob Dylan', duration: 369 },
      { title: 'Sweet Home Alabama', artist: 'Lynyrd Skynyrd', duration: 179 },
      { title: 'Hey Jude', artist: 'The Beatles', duration: 427 },
    ];

    let playlist = [];
    let onlineUsers = [];

    // ===== SEARCH FUNCTIONALITY =====
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase().trim();
      const resultsContainer = document.getElementById('searchResults');

      if (query.length === 0) {
        resultsContainer.classList.remove('active');
        return;
      }

      const results = musicDatabase.filter(track =>
        track.title.toLowerCase().includes(query) ||
        track.artist.toLowerCase().includes(query)
      );

      if (results.length === 0) {
        resultsContainer.innerHTML = '<div class="search-result-item" style="justify-content: center; cursor: default; color: var(--muted);">Keine Ergebnisse gefunden</div>';
        resultsContainer.classList.add('active');
        return;
      }

      resultsContainer.innerHTML = results.map((track, idx) => `
        <div class="search-result-item">
          <div class="search-result-info">
            <p class="search-result-title">${track.title}</p>
            <p class="search-result-artist">${track.artist}</p>
          </div>
          <button class="search-result-add" onclick="addTrackFromSearch(${idx})">+ Zur Queue</button>
        </div>
      `).join('');

      resultsContainer.classList.add('active');
    });

    // Close search on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-container')) {
        document.getElementById('searchResults').classList.remove('active');
      }
    });

    function addTrackFromSearch(dbIndex) {
      const track = musicDatabase[dbIndex];
      playlist.push(track);
      document.getElementById('searchInput').value = '';
      document.getElementById('searchResults').classList.remove('active');
      renderPlaylist();
      
      if (currentTrackIndex === -1) {
        playTrack(0);
      }
    }

    // ===== PLAYER FUNCTIONS =====
    function togglePlay() {
      if (playlist.length === 0) {
        alert('Bitte füge zuerst einen Song hinzu!');
        return;
      }

      if (currentTrackIndex === -1) {
        playTrack(0);
        return;
      }

      isPlaying = !isPlaying;
      updatePlayButton();
      simulatePlayback();
    }

    function updatePlayButton() {
      const playBtn = document.querySelector('.control-btn.play');
      playBtn.innerHTML = isPlaying ? 
        '<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>' :
        '<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><polygon points="5 3 19 12 5 21"></polygon></svg>';
    }

    function nextTrack() {
      if (playlist.length === 0) return;
      currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
      currentTime = 0;
      updateTrackDisplay();
      if (isPlaying) simulatePlayback();
    }

    function previousTrack() {
      if (playlist.length === 0) return;
      currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
      currentTime = 0;
      updateTrackDisplay();
      if (isPlaying) simulatePlayback();
    }

    function playTrack(index) {
      if (playlist.length === 0) return;
      currentTrackIndex = index;
      currentTime = 0;
      isPlaying = true;
      updatePlayButton();
      updateTrackDisplay();
      simulatePlayback();
    }

    function updateTrackDisplay() {
      if (currentTrackIndex === -1 || !playlist[currentTrackIndex]) return;
      
      const track = playlist[currentTrackIndex];
      document.getElementById('nowPlayingTitle').textContent = track.title;
      document.getElementById('nowPlayingArtist').textContent = track.artist;
      document.getElementById('duration').textContent = formatTime(track.duration);

      document.querySelectorAll('.track-item').forEach((el, i) => {
        el.classList.toggle('active', i === currentTrackIndex);
      });
    }

    function simulatePlayback() {
      if (playbackInterval) clearInterval(playbackInterval);

      const track = playlist[currentTrackIndex];
      const progressBar = document.getElementById('progressBar');
      const currentTimeEl = document.getElementById('currentTime');
      const progressFill = document.getElementById('progressFill');

      if (isPlaying) {
        playbackInterval = setInterval(() => {
          if (!isPlaying) {
            clearInterval(playbackInterval);
            return;
          }

          currentTime += 0.1;
          const percentage = (currentTime / track.duration) * 100;
          progressFill.style.width = Math.min(percentage, 100) + '%';
          currentTimeEl.textContent = formatTime(currentTime);

          if (currentTime >= track.duration) {
            clearInterval(playbackInterval);
            nextTrack();
            if (isPlaying) simulatePlayback();
          }
        }, 100);
      }
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // Progress bar click
    document.getElementById('progressBar').addEventListener('click', (e) => {
      if (playlist.length === 0) return;
      const rect = e.currentTarget.getBoundingClientRect();
      const percent = (e.clientX - rect.left) / rect.width;
      currentTime = percent * playlist[currentTrackIndex].duration;
      document.getElementById('progressFill').style.width = (percent * 100) + '%';
      document.getElementById('currentTime').textContent = formatTime(currentTime);
    });

    // ===== PLAYLIST FUNCTIONS =====
    function renderPlaylist() {
      const playlistEl = document.getElementById('playlist');
      
      if (playlist.length === 0) {
        playlistEl.innerHTML = '<div style="text-align: center; padding: 40px 20px; color: var(--muted);"><p>Keine Songs in der Queue. Nutze die Suchleiste um einen Song hinzuzufügen!</p></div>';
        document.getElementById('userCount').textContent = '0';
        return;
      }

      playlistEl.innerHTML = playlist.map((track, i) => `
        <div class="track-item ${i === currentTrackIndex ? 'active' : ''}" onclick="playTrack(${i})">
          <div class="track-number">${i + 1}</div>
          <div class="track-details">
            <p class="track-name">${track.title}</p>
            <p class="track-artist">${track.artist}</p>
          </div>
          <div class="track-duration">${formatTime(track.duration)}</div>
          <div class="track-actions">
            <button class="track-action-btn" onclick="removeTrack(${i}, event)" title="Entfernen">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>
      `).join('');
    }

    function removeTrack(index, event) {
      event.stopPropagation();
      playlist.splice(index, 1);
      
      if (currentTrackIndex >= playlist.length && currentTrackIndex > 0) {
        currentTrackIndex--;
      }
      
      if (playlist.length === 0) {
        currentTrackIndex = -1;
        isPlaying = false;
        updatePlayButton();
        document.getElementById('nowPlayingTitle').textContent = 'Keine Musik';
        document.getElementById('nowPlayingArtist').textContent = 'Füge einen Song hinzu';
      } else if (currentTrackIndex < playlist.length && isPlaying) {
        simulatePlayback();
      }
      
      renderPlaylist();
    }

    function addNewSong(event) {
      event.preventDefault();
      
      const title = document.getElementById('songName').value.trim();
      const artist = document.getElementById('artistName').value.trim();
      const durationStr = document.getElementById('songDuration').value.trim();

      if (!title || !artist || !durationStr) {
        alert('Bitte alle Felder ausfüllen');
        return;
      }

      const [mins, secs] = durationStr.split(':').map(Number);
      if (isNaN(mins) || isNaN(secs)) {
        alert('Ungültiges Zeit-Format. Nutze MM:SS');
        return;
      }

      const duration = mins * 60 + secs;
      playlist.push({ title, artist, duration });
      
      closeAddSongModal();
      renderPlaylist();
      
      if (currentTrackIndex === -1) {
        playTrack(0);
      }
    }

    function openAddSongModal() {
      document.getElementById('addSongModal').classList.add('active');
      document.getElementById('songName').focus();
    }

    function closeAddSongModal() {
      document.getElementById('addSongModal').classList.remove('active');
      document.getElementById('songName').value = '';
      document.getElementById('artistName').value = '';
      document.getElementById('songDuration').value = '3:45';
    }

    // ===== VOICE & USERS =====
    function connectVoice() {
      alert('Mit Voice Channel verbunden! 🎤');
    }

    function shareActivity() {
      alert('Activity geteilt! 📤');
    }

    function openSettings() {
      alert('Einstellungen werden in Kürze verfügbar 🔧');
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      renderPlaylist();
    });
  </script>
</body>
</html>
